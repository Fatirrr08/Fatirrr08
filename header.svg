<svg fill="none" viewBox="0 0 800 220" width="100%" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background: linear-gradient(-45deg, #2e3440, #3b4252, #434c5e, #5e81ac);
          background-size: 400% 400%;
          animation: gradient 10s ease infinite;
          height: 220px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: 'Fira Code', -apple-system, sans-serif;
          color: #eceff4;
          border-radius: 12px;
          position: relative;
          overflow: hidden;
          box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.4);
        }
        @keyframes gradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
        .chibi {
          width: 90px;
          height: auto;
          z-index: 10;
          filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .stars {
          position: absolute;
          width: 100%;
          height: 100%;
          background: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                      radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                      radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
          background-size: 550px 550px, 350px 350px, 250px 250px;
          background-position: 0 0, 40px 60px, 130px 270px;
          opacity: 0.4;
          animation: starMove 30s linear infinite;
        }
        @keyframes starMove {
          from { background-position: 0 0, 40px 60px, 130px 270px; }
          to { background-position: 550px 550px, 40px 610px, 130px 820px; }
        }
      </style>
      <div class="container">
        <div class="stars"></div>
        <img class="chibi" src="https://raw.githubusercontent.com/KITONK/KITONK/master/assets/luffy.gif" alt="Chibi Luffy" />
      </div>
    </div>
  </foreignObject>
</svg>
